<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>meme-opossum</title>
<style>
  html,body{margin:0;padding:0;background:#000;}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;}
  canvas{display:block;max-width:100%;height:auto;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const EXTS=["jpg","jpeg","png","webp","gif"];
function loadImage(n){
  return new Promise((resolve,reject)=>{
    let i=0;
    const img=new Image();
    img.onload=()=>resolve(img);
    img.onerror=()=>{
      i++;
      if(i>=EXTS.length){reject(new Error("image "+n+" not found"));return;}
      img.src="images/"+n+"."+EXTS[i];
    };
    img.src="images/"+n+"."+EXTS[0];
  });
}
function splitLines(text){
  return text.split(/[,，]/).map(s=>s.trim()).filter(Boolean).slice(0,3);
}
function draw(ctx,cv,IMG,text){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.drawImage(IMG,0,0,cv.width,cv.height);
  if(!text)return;
  const h=cv.height;
  const fontSize=Math.round(h*0.1);
  const lh=Math.round(fontSize*1.12);
  ctx.font='700 '+fontSize+'px -apple-system,"Segoe UI","PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif';
  ctx.textAlign="center";
  ctx.textBaseline="alphabetic";
  ctx.fillStyle="#fff";
  ctx.shadowColor="rgba(0,0,0,.85)";
  ctx.shadowBlur=Math.max(8,Math.round(h*0.012));
  ctx.shadowOffsetX=0;
  ctx.shadowOffsetY=Math.max(4,Math.round(h*0.006));
  const lines=splitLines(text);
  const baseY=h-Math.round(h*0.06)-(lines.length-1)*lh;
  for(let i=0;i<lines.length;i++){
    ctx.fillText(lines[i],cv.width/2,baseY+i*lh);
  }
}
function download(cv,text){
  cv.toBlob(b=>{
    const a=document.createElement("a");
    const safe=(text||"meme").replace(/[\\/:*?"<>|\r\n]+/g,"_").slice(0,40);
    a.href=URL.createObjectURL(b);
    a.download=safe+".png";
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  },"image/png");
}
(async()=>{
  const p=new URLSearchParams(location.search);
  const text=p.get("text")||"";
  const n=Math.max(0,parseInt(p.get("img")||"0",10)|0);
  const cv=document.getElementById("c");
  const ctx=cv.getContext("2d");
  let IMG;
  try{ IMG=await loadImage(n); }
  catch(e){
    document.body.innerHTML='<pre style="color:#fff;padding:20px;font:14px monospace;">'+e.message+'</pre>';
    return;
  }
  cv.width=IMG.naturalWidth;
  cv.height=IMG.naturalHeight;
  draw(ctx,cv,IMG,text);
  if(text)download(cv,text);
})();
</script>
</body>
</html>
