const IMG=new Image();
IMG.src="data:image/jpeg;base64,"+B64;
const cv=document.getElementById("c");
const ctx=cv.getContext("2d");
function wrap(text,maxW){
  const out=[];let cur="";
  for(const ch of text){
    const test=cur+ch;
    if(ctx.measureText(test).width>maxW&&cur){out.push(cur);cur=ch;}
    else cur=test;
  }
  if(cur)out.push(cur);
  return out;
}
function draw(text){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.drawImage(IMG,0,0,cv.width,cv.height);
  if(!text)return;
  ctx.font='700 120px -apple-system,"Segoe UI","PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif';
  ctx.textAlign="center";
  ctx.textBaseline="alphabetic";
  ctx.fillStyle="#fff";
  ctx.shadowColor="rgba(0,0,0,.85)";
  ctx.shadowBlur=12;
  ctx.shadowOffsetX=0;
  ctx.shadowOffsetY=6;
  const lines=wrap(text,cv.width-80);
  const lh=140;
  const baseY=cv.height-60-(lines.length-1)*lh;
  for(let i=0;i<lines.length;i++){
    ctx.fillText(lines[i],cv.width/2,baseY+i*lh);
  }
}
function download(text){
  cv.toBlob(b=>{
    const a=document.createElement("a");
    const safe=(text||"meme").replace(/[\\/:*?"<>|\r\n]+/g,"_").slice(0,40);
    a.href=URL.createObjectURL(b);
    a.download=safe+".png";
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  },"image/png");
}
function go(e){
  if(e)e.preventDefault();
  const t=document.getElementById("t").value.trim();
  draw(t);
  if(t)download(t);
  return false;
}
IMG.onload=()=>{
  const p=new URLSearchParams(location.search);
  const text=p.get("text");
  if(text!==null&&text!==""){
    document.getElementById("t").value=text;
    draw(text);
    download(text);
  }else{
    draw("");
  }
};
</script>
