<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>meme-opossum</title>
<style>
  @font-face{
    font-family:"Noto Color Emoji";
    src:url("fonts/NotoColorEmoji.ttf") format("truetype");
    font-display:block;
  }
  html,body{margin:0;padding:0;background:#000;}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;}
  canvas{display:block;max-width:100%;height:auto;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const EXTS=["jpg","jpeg","png","webp","gif"];
const TEXT_FAMILY='-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif';
const EMOJI_RE=/\p{Extended_Pictographic}/u;

function encodePath(p){
  return p.split("/").map(encodeURIComponent).join("/");
}
function loadImage(p){
  return new Promise((resolve,reject)=>{
    let i=0;
    const img=new Image();
    const enc=encodePath(p);
    img.onload=()=>resolve(img);
    img.onerror=()=>{
      i++;
      if(i>=EXTS.length){reject(new Error("image "+p+" not found"));return;}
      img.src="images/"+enc+"."+EXTS[i];
    };
    img.src="images/"+enc+"."+EXTS[0];
  });
}
function splitLines(text){
  return text.split(/[,，]/).map(s=>s.trim()).filter(Boolean).slice(0,3);
}
function segments(text){
  const seg=new Intl.Segmenter("zh",{granularity:"grapheme"});
  const out=[];
  let cur=null;
  for(const {segment} of seg.segment(text)){
    const isEmoji=EMOJI_RE.test(segment);
    if(cur&&cur.isEmoji===isEmoji){cur.text+=segment;}
    else{cur={isEmoji,text:segment};out.push(cur);}
  }
  return out;
}
function sampleLuminance(ctx,cx,cy,w,h){
  const cvw=ctx.canvas.width, cvh=ctx.canvas.height;
  const x=Math.max(0,Math.floor(cx-w/2));
  const y=Math.max(0,Math.floor(cy-h/2));
  const ww=Math.min(cvw-x,Math.round(w));
  const hh=Math.min(cvh-y,Math.round(h));
  if(ww<=0||hh<=0)return 255;
  const data=ctx.getImageData(x,y,ww,hh).data;
  let sum=0;
  const n=data.length/4;
  for(let i=0;i<data.length;i+=4){
    sum+=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
  }
  return sum/n;
}
function drawLine(ctx,segs,cx,y,fontText,fontEmoji,fill,stroke,strokeW){
  ctx.textAlign="left";
  ctx.textBaseline="alphabetic";
  ctx.lineJoin="round";
  ctx.miterLimit=2;
  ctx.lineWidth=strokeW;
  ctx.strokeStyle=stroke;
  ctx.fillStyle=fill;
  let totalW=0;
  const widths=[];
  for(const s of segs){
    ctx.font=s.isEmoji?fontEmoji:fontText;
    const w=ctx.measureText(s.text).width;
    widths.push(w);
    totalW+=w;
  }
  let x=cx-totalW/2;
  for(let i=0;i<segs.length;i++){
    const s=segs[i];
    ctx.font=s.isEmoji?fontEmoji:fontText;
    if(!s.isEmoji)ctx.strokeText(s.text,x,y);
    ctx.fillText(s.text,x,y);
    x+=widths[i];
  }
}
function draw(ctx,cv,IMG,text){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.drawImage(IMG,0,0,cv.width,cv.height);
  if(!text)return;
  const h=cv.height;
  const fontSize=Math.round(h*0.1);
  const lh=Math.round(fontSize*1.12);
  const strokeW=Math.max(2,Math.round(fontSize*0.08));
  const fontText='700 '+fontSize+'px '+TEXT_FAMILY;
  const fontEmoji=fontSize+'px "Noto Color Emoji"';
  const lines=splitLines(text);
  const baseY=h-Math.round(h*0.06)-(lines.length-1)*lh;
  const sampleH=Math.round(fontSize*1.0);
  const sampleW=Math.round(cv.width*0.9);
  for(let i=0;i<lines.length;i++){
    const y=baseY+i*lh;
    const cy=y-Math.round(fontSize*0.4);
    const lum=sampleLuminance(ctx,cv.width/2,cy,sampleW,sampleH);
    const dark=lum<=140;
    const fill=dark?"#fff":"#000";
    const stroke=dark?"#000":"#fff";
    drawLine(ctx,segments(lines[i]),cv.width/2,y,fontText,fontEmoji,fill,stroke,strokeW);
  }
}
function download(cv,text){
  cv.toBlob(b=>{
    const a=document.createElement("a");
    const safe=(text||"meme").replace(/[\\/:*?"<>|\r\n]+/g,"_").slice(0,40);
    a.href=URL.createObjectURL(b);
    a.download=safe+".png";
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  },"image/png");
}
(async()=>{
  const p=new URLSearchParams(location.search);
  const text=p.get("text")||"";
  const imgPath=p.get("img")||"";
  const cv=document.getElementById("c");
  const ctx=cv.getContext("2d");
  if(!imgPath){
    document.body.innerHTML='<pre style="color:#fff;padding:20px;font:14px monospace;">missing img parameter</pre>';
    return;
  }
  let IMG;
  try{ IMG=await loadImage(imgPath); }
  catch(e){
    document.body.innerHTML='<pre style="color:#fff;padding:20px;font:14px monospace;">'+e.message+'</pre>';
    return;
  }
  cv.width=IMG.naturalWidth;
  cv.height=IMG.naturalHeight;
  try{
    await document.fonts.load('700 32px '+TEXT_FAMILY,"测试");
    await document.fonts.load('32px "Noto Color Emoji"',"😀");
    await document.fonts.ready;
  }catch{}
  draw(ctx,cv,IMG,text);
  if(text)download(cv,text);
})();
</script>
</body>
</html>
